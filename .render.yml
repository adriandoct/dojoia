{
  "build": {
    "builder": "nixpacks",
    "buildCommand": "npm ci && npm run build",
    "publish": "npm start"
  },
  "deploy": {
    "numReplicas": 1,
    "sleepApplication": false,
    "restartPolicyType": "ON_FAILURE",
    "restartPolicyMaxRetries": 10
  },
  "env": [
    {
      "key": "NODE_ENV",
      "value": "production"
    }
  ]
}
